            Your task is to analyze the provided image and determine whether it contains:

            A PERSON (full body, upper body, or portrait suitable for virtual try-on)

            A CLOTH item (any clothing item like shirt, dress, pants, jacket, etc.)

            You must respond with ONLY a valid JSON object in this exact format:

            {

            “detected_type”: “person”

            }

            OR

            {

            “detected_type”: “cloth”

            }

            Rules:

            detected_type must be exactly “person” or “cloth” (lowercase)

            Do not include any additional text, explanation, or formatting

            Respond in the same language as any text visible in the image, or English
            if no text is present.

            Output valid JSON only:

            {“detected_type": person OR cloth}'
